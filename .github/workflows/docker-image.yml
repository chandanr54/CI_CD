name: Docker Build -> Push ->Deploy
on:
  push:
    branches: [ "main" ]


jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses:  actions/setup-java@v5
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '25'
    
    - name: Build Jar
      run: |
        chmod +x ./mvnw
       ./mvnw clean package -DskipTest

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: docker build -t ${{secrets.DOCKERHUB_USERNAME}}/ci_cd

    - name: Push Image to Docker
      run: docker push ${{secrets.DOCKERHUB_USERNAME}}/ci_cd

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop spring-demo || true
          docker rm spring-demo || true
          docker pull ${{secrets.DOCKERHUB_USERNAME}}/ci_cd
          docker run -d -p 8080:8080 --name spring-demo ${{secrets.DOCKERHUB_USERNAME}}/ci_cd
       
